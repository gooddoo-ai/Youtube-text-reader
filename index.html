<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT Script — YouTube 스크립트 추출기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #060608; --surface: #0e0e12; --border: #1e1e26;
    --accent: #d4f542; --text: #e8e8f0; --muted: #5a5a72; --error: #ff5b5b;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; padding: 40px 20px; }
  .container { max-width: 780px; margin: 0 auto; }

header { margin-bottom: 48px; }
.logo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.logo-badge { background: #d4f542; color: #000; font-family: ‘Space Mono’, monospace; font-size: 11px; font-weight: 700; padding: 4px 9px; letter-spacing: .1em; border-radius: 2px; }
.logo-line { flex: 1; height: 1px; background: #1e1e26; }
h1 { font-size: clamp(36px, 7vw, 62px); font-weight: 800; line-height: 1.05; letter-spacing: -.03em; }
h1 span { color: #d4f542; }
.subtitle { margin-top: 12px; color: #5a5a72; font-size: 14px; font-family: ‘Space Mono’, monospace; letter-spacing: .04em; }

.url-wrap { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.url-input { flex: 1; min-width: 200px; background: #0e0e12; border: 1px solid #1e1e26; border-radius: 6px; color: #e8e8f0; font-family: ‘Space Mono’, monospace; font-size: 13px; padding: 14px 18px; outline: none; transition: border-color .2s; }
.url-input::placeholder { color: #5a5a72; }
.url-input:focus { border-color: #d4f542; }
.lang-select { background: #0e0e12; border: 1px solid #1e1e26; border-radius: 6px; color: #e8e8f0; font-family: ‘Syne’, sans-serif; font-size: 13px; padding: 0 14px; outline: none; cursor: pointer; min-width: 90px; }
.lang-select option { background: #0e0e12; }
.extract-btn { background: #d4f542; color: #000; border: none; border-radius: 6px; font-family: ‘Syne’, sans-serif; font-size: 14px; font-weight: 700; padding: 14px 28px; cursor: pointer; letter-spacing: .04em; transition: all .15s; white-space: nowrap; }
.extract-btn:hover { background: #c4e832; transform: translateY(-1px); }
.extract-btn:active { transform: translateY(0); }
.extract-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.hint { color: #5a5a72; font-size: 11px; font-family: ‘Space Mono’, monospace; }
.hint::before { content: ’→ ’; color: #d4f542; }

.status-bar { display: none; align-items: center; gap: 10px; margin: 16px 0; padding: 12px 16px; background: #0e0e12; border: 1px solid #1e1e26; border-radius: 6px; font-family: ‘Space Mono’, monospace; font-size: 12px; color: #5a5a72; }
.status-bar.on { display: flex; }
.spinner { width: 14px; height: 14px; border: 2px solid #1e1e26; border-top-color: #d4f542; border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
.dot-ok  { width: 8px; height: 8px; border-radius: 50%; background: #d4f542; flex-shrink: 0; }
.dot-err { width: 8px; height: 8px; border-radius: 50%; background: #ff5b5b; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }

.error-box { display: none; background: #1a0808; border: 1px solid #3a1010; border-radius: 8px; padding: 20px 24px; font-family: ‘Space Mono’, monospace; font-size: 12px; color: #ff5b5b; line-height: 1.9; margin-bottom: 16px; }
.error-box.on { display: block; }
.error-box strong { display: block; margin-bottom: 8px; font-size: 13px; }
.fallback { margin-top: 14px; padding-top: 12px; border-top: 1px solid #3a1010; color: #886666; font-size: 11px; line-height: 2; }

.result-section { display: none; }
.result-section.on { display: block; }
.result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
.result-meta { font-size: 12px; font-family: ‘Space Mono’, monospace; color: #5a5a72; }
.result-meta strong { color: #d4f542; }
.action-btns { display: flex; gap: 8px; }
.action-btn { background: #0e0e12; border: 1px solid #1e1e26; border-radius: 4px; color: #e8e8f0; font-family: ‘Syne’, sans-serif; font-size: 12px; font-weight: 600; padding: 7px 14px; cursor: pointer; transition: all .15s; }
.action-btn:hover { border-color: #d4f542; color: #d4f542; }
.copied { color: #d4f542 !important; border-color: #d4f542 !important; }
.transcript-box { background: #0e0e12; border: 1px solid #1e1e26; border-radius: 8px; padding: 24px; font-family: ‘Space Mono’, monospace; font-size: 13px; line-height: 1.9; color: #c8c8dc; white-space: pre-wrap; word-break: break-word; max-height: 520px; overflow-y: auto; resize: vertical; scrollbar-width: thin; scrollbar-color: #1e1e26 transparent; }
.transcript-box::-webkit-scrollbar { width: 5px; }
.transcript-box::-webkit-scrollbar-thumb { background: #1e1e26; border-radius: 3px; }

footer { margin-top: 48px; padding-top: 24px; border-top: 1px solid #1e1e26; display: flex; justify-content: space-between; font-size: 11px; font-family: ‘Space Mono’, monospace; color: #5a5a72; }
footer span { color: #d4f542; }
</style>

</head>
<body>
<div class="container">
  <header>
    <div class="logo-row">
      <div class="logo-badge">YT SCRIPT</div>
      <div class="logo-line"></div>
      <span style="font-family:'Space Mono',monospace;font-size:11px;color:#5a5a72;">v2.0</span>
    </div>
    <h1>YouTube<br><span>스크립트</span> 추출기</h1>
    <p class="subtitle">// URL 붙여넣기 → 텍스트 추출 → 복사</p>
  </header>

  <div style="margin-bottom:24px">
    <div class="url-wrap">
      <input class="url-input" type="text" id="urlInput"
        placeholder="https://youtu.be/... 또는 youtube.com/watch?v=..."
        autocomplete="off" spellcheck="false"/>
      <select class="lang-select" id="langSelect">
        <option value="ko">한국어</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="zh-Hans">中文(简)</option>
        <option value="zh-Hant">中文(繁)</option>
      </select>
      <button class="extract-btn" id="extractBtn" onclick="run()">추출하기</button>
    </div>
    <p class="hint">자막(자동 생성 포함)이 있는 영상 지원 · 8개 서버 순차 시도</p>
  </div>

  <div class="status-bar" id="statusBar">
    <div class="spinner" id="statusIcon"></div>
    <span id="statusText"></span>
  </div>

  <div class="error-box" id="errorBox">
    <strong>⚠ 추출 실패</strong>
    <span id="errorMsg"></span>
    <div class="fallback">
      직접 가져오는 방법:<br>
      YouTube 영상 페이지 → 하단 <b>···</b> 버튼 → <b>"스크립트 열기"</b> 클릭 → 텍스트 복사
    </div>
  </div>

  <div class="result-section" id="resultSection">
    <div class="result-header">
      <div class="result-meta">
        <strong id="wordCount">0</strong>단어 &nbsp;·&nbsp;
        <strong id="charCount">0</strong>자
        <span id="trackLabel" style="opacity:.5;font-size:10px;margin-left:6px;"></span>
      </div>
      <div class="action-btns">
        <button class="action-btn" id="copyBtn" onclick="copyText()">복사</button>
        <button class="action-btn" onclick="downloadText()">다운로드</button>
        <button class="action-btn" onclick="reset()">초기화</button>
      </div>
    </div>
    <div class="transcript-box" id="transcriptBox"></div>
  </div>

  <footer>
    <span>Invidious API</span>
    <span>gooddoo-ai</span>
  </footer>
</div>

<script>
// ── Invidious 공개 인스턴스 (CORS open — 프록시 불필요) ──────
const INSTANCES = [
  'https://inv.nadeko.net',
  'https://invidious.privacydev.net',
  'https://yt.artemislena.eu',
  'https://invidious.lunar.icu',
  'https://invidious.io.lol',
  'https://iv.melmac.space',
  'https://invidious.fdn.fr',
  'https://vid.puffyan.us',
];

// ── Util ─────────────────────────────────────────────────────
function getId(url) {
  const m = url.trim().match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  if (/^[a-zA-Z0-9_-]{11}$/.test(url.trim())) return url.trim();
  return null;
}

function st(msg, type) {
  document.getElementById('statusBar').classList.add('on');
  document.getElementById('statusText').textContent = msg;
  const ic = document.getElementById('statusIcon');
  ic.className = type === 'ok' ? 'dot-ok' : type === 'err' ? 'dot-err' : 'spinner';
}

function showErr(msg) {
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('errorBox').classList.add('on');
  st('추출 실패', 'err');
}

function reset() {
  ['resultSection','errorBox'].forEach(id => document.getElementById(id).classList.remove('on'));
  document.getElementById('statusBar').classList.remove('on');
  document.getElementById('transcriptBox').textContent = '';
  document.getElementById('urlInput').value = '';
}

function decodeHtml(s) {
  return s.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
          .replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&nbsp;/g,' ')
          .replace(/&#(\d+);/g,(_,n)=>String.fromCharCode(n))
          .replace(/<[^>]+>/g,'');
}

function parseVTT(vtt) {
  const lines = vtt.split('\n');
  const out = []; let prev = '';
  for (const raw of lines) {
    const l = raw.trim();
    if (!l || l === 'WEBVTT' || l.startsWith('NOTE') || /^\d+$/.test(l) || /-->/.test(l)) continue;
    const clean = decodeHtml(l);
    if (clean && clean !== prev) { out.push(clean); prev = clean; }
  }
  return out.join(' ').replace(/\s+/g,' ').trim();
}

// ── 핵심 로직 ────────────────────────────────────────────────
async function fetchTranscript(videoId, lang) {
  let lastErr = '';
  for (let i = 0; i < INSTANCES.length; i++) {
    const host = INSTANCES[i];
    st(`[${i+1}/${INSTANCES.length}] ${host.replace('https://','')} 시도...`);
    try {
      // 1) 자막 목록 조회
      const listRes = await fetch(`${host}/api/v1/captions/${videoId}`, {
        signal: AbortSignal.timeout(7000),
      });
      if (!listRes.ok) { lastErr = `목록 HTTP ${listRes.status}`; continue; }

      const json = await listRes.json();
      const caps = json.captions || [];
      if (!caps.length) {
        // 자막 없음 — 다른 인스턴스도 같은 결과일 것이므로 바로 종료
        throw { noSubs: true };
      }

      // 2) 언어 선택 (우선순위: 선택 언어 > 언어 코드 접두어 > ko > en > 첫 번째)
      const prefs = [lang, lang.split('-')[0], 'ko', 'en'];
      let cap = null;
      for (const p of prefs) {
        cap = caps.find(c => c.languageCode === p || c.languageCode?.startsWith(p + '-'));
        if (cap) break;
      }
      if (!cap) cap = caps[0];

      st(`[${i+1}/${INSTANCES.length}] "${cap.label}" 자막 다운로드...`);

      // 3) VTT 직접 요청 — Invidious가 CORS * 허용하므로 프록시 불필요
      const capRes = await fetch(
        `${host}/api/v1/captions/${videoId}?label=${encodeURIComponent(cap.label)}`,
        { signal: AbortSignal.timeout(12000) }
      );
      if (!capRes.ok) { lastErr = `캡션 HTTP ${capRes.status}`; continue; }

      const vtt = await capRes.text();
      if (!vtt.includes('WEBVTT')) { lastErr = '잘못된 VTT 형식'; continue; }

      const text = parseVTT(vtt);
      if (text.length < 10) { lastErr = '내용 비어있음'; continue; }

      return { text, label: cap.label || cap.languageCode };

    } catch (e) {
      if (e?.noSubs) throw new Error('이 영상에는 자막이 없습니다.\n(자동 생성 자막 포함)');
      lastErr = e.name === 'TimeoutError' ? '타임아웃' : (e.message || String(e));
    }
  }
  throw new Error(`모든 서버 연결 실패.\n마지막 오류: ${lastErr}`);
}

// ── UI 진입점 ────────────────────────────────────────────────
async function run() {
  const urlVal = document.getElementById('urlInput').value.trim();
  const lang   = document.getElementById('langSelect').value;
  if (!urlVal) { showErr('URL을 입력해주세요.'); return; }
  const videoId = getId(urlVal);
  if (!videoId) { showErr('유효한 YouTube URL이 아닙니다.'); return; }

  const btn = document.getElementById('extractBtn');
  btn.disabled = true;
  document.getElementById('errorBox').classList.remove('on');
  document.getElementById('resultSection').classList.remove('on');

  try {
    const { text, label } = await fetchTranscript(videoId, lang);
    const words = text.split(/\s+/).filter(Boolean).length;
    document.getElementById('wordCount').textContent = words.toLocaleString();
    document.getElementById('charCount').textContent = text.length.toLocaleString();
    document.getElementById('trackLabel').textContent = `[${label}]`;
    document.getElementById('transcriptBox').textContent = text;
    document.getElementById('resultSection').classList.add('on');
    st(`완료 — ${words.toLocaleString()}단어`, 'ok');
  } catch (e) {
    showErr(e.message || '알 수 없는 오류');
  } finally {
    btn.disabled = false;
  }
}

async function copyText() {
  const text = document.getElementById('transcriptBox').textContent;
  if (!text) return;
  try { await navigator.clipboard.writeText(text); } catch {}
  const btn = document.getElementById('copyBtn');
  btn.textContent = '✓ 복사됨'; btn.classList.add('copied');
  setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 2000);
}

function downloadText() {
  const text = document.getElementById('transcriptBox').textContent;
  if (!text) return;
  const id = getId(document.getElementById('urlInput').value) || 'transcript';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], { type: 'text/plain;charset=utf-8' }));
  a.download = `transcript_${id}.txt`;
  a.click(); URL.revokeObjectURL(a.href);
}

document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') run();
});
</script>

</body>
</html>
