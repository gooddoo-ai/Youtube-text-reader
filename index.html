<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT Script — YouTube 스크립트 추출기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#060608;--sf:#0e0e12;--bd:#1e1e26;--ac:#d4f542;--tx:#e8e8f0;--mu:#5a5a72;--er:#ff5b5b}
  body{background:var(--bg);color:var(--tx);font-family:'Syne',sans-serif;min-height:100vh;padding:40px 20px}
  .wrap{max-width:800px;margin:0 auto}

header{margin-bottom:44px}
.badge-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.badge{background:#d4f542;color:#000;font-family:‘Space Mono’,monospace;font-size:11px;font-weight:700;padding:4px 9px;letter-spacing:.1em;border-radius:2px}
.line{flex:1;height:1px;background:#1e1e26}
h1{font-size:clamp(34px,6vw,58px);font-weight:800;line-height:1.05;letter-spacing:-.03em}
h1 em{color:#d4f542;font-style:normal}
.sub{margin-top:10px;color:#5a5a72;font-size:13px;font-family:‘Space Mono’,monospace}

.row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
input.url{flex:1;min-width:200px;background:#0e0e12;border:1px solid #1e1e26;border-radius:6px;color:#e8e8f0;font-family:‘Space Mono’,monospace;font-size:13px;padding:14px 18px;outline:none;transition:border-color .2s}
input.url::placeholder{color:#5a5a72}
input.url:focus{border-color:#d4f542}
select{background:#0e0e12;border:1px solid #1e1e26;border-radius:6px;color:#e8e8f0;font-family:‘Syne’,sans-serif;font-size:13px;padding:0 14px;outline:none;cursor:pointer;min-width:86px}
select option{background:#0e0e12}
.go{background:#d4f542;color:#000;border:none;border-radius:6px;font-family:‘Syne’,sans-serif;font-size:14px;font-weight:700;padding:14px 26px;cursor:pointer;letter-spacing:.04em;transition:all .15s;white-space:nowrap}
.go:hover{background:#c4e832;transform:translateY(-1px)}
.go:active{transform:none}
.go:disabled{opacity:.5;cursor:not-allowed;transform:none}
.hint{color:#5a5a72;font-size:11px;font-family:‘Space Mono’,monospace}
.hint::before{content:’→ ’;color:#d4f542}

.sbar{display:none;align-items:center;gap:10px;margin:14px 0;padding:12px 16px;background:#0e0e12;border:1px solid #1e1e26;border-radius:6px;font-family:‘Space Mono’,monospace;font-size:12px;color:#5a5a72}
.sbar.on{display:flex}
.spin{width:14px;height:14px;border:2px solid #1e1e26;border-top-color:#d4f542;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.dok{width:8px;height:8px;border-radius:50%;background:#d4f542;flex-shrink:0}
.derr{width:8px;height:8px;border-radius:50%;background:#ff5b5b;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

.ebox{display:none;background:#1a0808;border:1px solid #3a1010;border-radius:8px;padding:18px 22px;font-family:‘Space Mono’,monospace;font-size:12px;color:#ff5b5b;line-height:1.9;margin-bottom:14px;white-space:pre-wrap}
.ebox.on{display:block}
.ebox strong{display:block;margin-bottom:6px;font-size:13px}
.ebox .tip{color:#886666;margin-top:12px;padding-top:12px;border-top:1px solid #3a1010;font-size:11px;line-height:2}

.res{display:none}
.res.on{display:block}
.rhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:10px}
.meta{font-size:12px;font-family:‘Space Mono’,monospace;color:#5a5a72}
.meta strong{color:#d4f542}
.btns{display:flex;gap:8px}
.btn{background:#0e0e12;border:1px solid #1e1e26;border-radius:4px;color:#e8e8f0;font-family:‘Syne’,sans-serif;font-size:12px;font-weight:600;padding:7px 14px;cursor:pointer;transition:all .15s}
.btn:hover{border-color:#d4f542;color:#d4f542}
.cp{color:#d4f542!important;border-color:#d4f542!important}
.tbox{background:#0e0e12;border:1px solid #1e1e26;border-radius:8px;padding:22px;font-family:‘Space Mono’,monospace;font-size:13px;line-height:1.9;color:#c8c8dc;white-space:pre-wrap;word-break:break-word;max-height:520px;overflow-y:auto;resize:vertical;scrollbar-width:thin;scrollbar-color:#1e1e26 transparent}
.tbox::-webkit-scrollbar{width:5px}
.tbox::-webkit-scrollbar-thumb{background:#1e1e26;border-radius:3px}

footer{margin-top:44px;padding-top:20px;border-top:1px solid #1e1e26;display:flex;justify-content:space-between;font-size:11px;font-family:‘Space Mono’,monospace;color:#5a5a72}
footer em{color:#d4f542;font-style:normal}
</style>

</head>
<body>
<div class="wrap">
  <header>
    <div class="badge-row">
      <div class="badge">YT SCRIPT</div>
      <div class="line"></div>
      <span style="font-family:'Space Mono',monospace;font-size:11px;color:#5a5a72">v4.0 · No API Key</span>
    </div>
    <h1>YouTube<br><em>스크립트</em> 추출기</h1>
    <p class="sub">// API 키 없이 자막을 직접 추출합니다</p>
  </header>

  <div style="margin-bottom:24px">
    <div class="row">
      <input class="url" type="text" id="urlInput"
        placeholder="https://youtu.be/... 또는 youtube.com/watch?v=..."
        autocomplete="off" spellcheck="false"/>
      <select id="langSel">
        <option value="ko">한국어</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="zh">中文</option>
      </select>
      <button class="go" id="goBtn" onclick="run()">추출하기</button>
    </div>
    <p class="hint">자막(자동 생성 포함) 지원 · API 키 불필요</p>
  </div>

  <div class="sbar" id="sbar"><div class="spin" id="sicon"></div><span id="stxt"></span></div>
  <div class="ebox" id="ebox"><strong>⚠ 추출 실패</strong><span id="emsg"></span><div class="tip">직접 가져오는 방법: YouTube → 영상 하단 ··· → 스크립트 열기 → 복사</div></div>

  <div class="res" id="res">
    <div class="rhead">
      <div class="meta"><strong id="wc">0</strong>단어 &nbsp;·&nbsp; <strong id="cc">0</strong>자 <span id="tlabel" style="opacity:.5;font-size:10px;margin-left:6px"></span></div>
      <div class="btns">
        <button class="btn" id="cpBtn" onclick="cp()">복사</button>
        <button class="btn" onclick="dl()">다운로드</button>
        <button class="btn" onclick="reset()">초기화</button>
      </div>
    </div>
    <div class="tbox" id="tbox"></div>
  </div>

  <footer><em>No-API · allorigins proxy chain</em><em>gooddoo-ai</em></footer>
</div>

<script>
// ── CORS 프록시 목록 (순차 폴백) ─────────────────────────────
const PROXIES = [
  url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`,
];

// allorigins 응답은 {contents: "..."} 형태, 나머지는 raw text
async function proxyFetch(targetUrl, timeoutMs = 10000) {
  for (let i = 0; i < PROXIES.length; i++) {
    const proxyUrl = PROXIES[i](targetUrl);
    try {
      st(`프록시 ${i+1}/${PROXIES.length} 시도 중...`);
      const r = await fetch(proxyUrl, { signal: AbortSignal.timeout(timeoutMs) });
      if (!r.ok) continue;
      // allorigins returns JSON wrapper
      if (proxyUrl.includes('allorigins')) {
        const j = await r.json();
        if (j.contents) return j.contents;
        continue;
      }
      return await r.text();
    } catch { continue; }
  }
  throw new Error('모든 프록시 연결 실패');
}

// ── Helpers ───────────────────────────────────────────────────
function getId(url) {
  const m = url.trim().match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  if (/^[a-zA-Z0-9_-]{11}$/.test(url.trim())) return url.trim();
  return null;
}

function st(msg, type = 'spin') {
  document.getElementById('sbar').classList.add('on');
  document.getElementById('stxt').textContent = msg;
  const ic = document.getElementById('sicon');
  ic.className = type === 'ok' ? 'dok' : type === 'err' ? 'derr' : 'spin';
}
function err(msg) {
  document.getElementById('emsg').textContent = '\n' + msg;
  document.getElementById('ebox').classList.add('on');
  st('실패', 'err');
}
function reset() {
  ['res','ebox'].forEach(id => document.getElementById(id).classList.remove('on'));
  document.getElementById('sbar').classList.remove('on');
  document.getElementById('tbox').textContent = '';
  document.getElementById('urlInput').value = '';
}
function decHtml(s) {
  return s.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
          .replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&nbsp;/g,' ')
          .replace(/&#(\d+);/g,(_,n)=>String.fromCharCode(n))
          .replace(/<[^>]+>/g,'');
}
function parseVTT(vtt) {
  const out=[]; let prev='';
  for (const raw of vtt.split('\n')) {
    const l = raw.trim();
    if (!l||l==='WEBVTT'||l.startsWith('NOTE')||/^\d+$/.test(l)||/-->/.test(l)) continue;
    const clean = decHtml(l);
    if (clean && clean !== prev) { out.push(clean); prev = clean; }
  }
  return out.join(' ').replace(/\s+/g,' ').trim();
}
function parseXML(xml) {
  try {
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    return [...doc.querySelectorAll('text')]
      .map(t => decHtml(t.textContent.trim()))
      .filter(Boolean).join(' ').replace(/\s+/g,' ').trim();
  } catch { return ''; }
}

// ── Method 1: YouTube Timedtext API ───────────────────────────
async function tryTimedtext(videoId, lang) {
  st('YouTube 자막 API 시도 중...');
  const langs = [lang, 'ko', 'en', 'ja'];
  const tried = new Set();
  for (const l of langs) {
    if (tried.has(l)) continue; tried.add(l);
    // Try both manual and auto-generated
    for (const kind of ['', 'asr']) {
      const apiUrl = `https://www.youtube.com/api/timedtext?v=${videoId}&lang=${l}${kind?'&kind='+kind:''}&fmt=json3`;
      try {
        const html = await proxyFetch(apiUrl, 8000);
        const data = JSON.parse(html);
        const events = data.events || [];
        if (!events.length) continue;
        let text = '';
        for (const ev of events) {
          if (!ev.segs) continue;
          const line = ev.segs.map(s=>s.utf8||'').join('').replace(/\n/g,' ').trim();
          if (line) text += line + ' ';
        }
        text = text.trim();
        if (text.length > 30) return { text, label: `${l}${kind?' (auto)':''}` };
      } catch { continue; }
    }
  }
  throw new Error('timedtext_failed');
}

// ── Method 2: Parse ytInitialPlayerResponse from YouTube page ─
async function tryPageParse(videoId, lang) {
  st('YouTube 페이지에서 자막 정보 파싱 중...');
  const html = await proxyFetch(`https://www.youtube.com/watch?v=${videoId}`, 15000);

  // Extract ytInitialPlayerResponse
  const match = html.match(/ytInitialPlayerResponse\s*=\s*(\{.+?\});(?:\s*(?:var|const|let)\s+\w+|<\/script>)/s)
    || html.match(/ytInitialPlayerResponse\s*=\s*(\{[\s\S]+?\})\s*;/);
  if (!match) throw new Error('ytInitialPlayerResponse not found');

  let playerData;
  try { playerData = JSON.parse(match[1]); }
  catch { throw new Error('JSON parse failed'); }

  const tracks = playerData?.captions?.playerCaptionsTracklistRenderer?.captionTracks;
  if (!tracks?.length) throw new Error('no_captions');

  // Pick best language
  const prefs = [lang, lang.split('-')[0], 'ko', 'en'];
  let track = null;
  for (const p of prefs) {
    track = tracks.find(t => t.languageCode === p || t.languageCode?.startsWith(p));
    if (track) break;
  }
  if (!track) track = tracks[0];

  st(`자막 다운로드: ${track.name?.simpleText || track.languageCode}`);

  // Fetch caption via proxy
  const capUrl = track.baseUrl + '&fmt=json3';
  const capHtml = await proxyFetch(capUrl, 10000);
  const capData = JSON.parse(capHtml);
  const events = capData.events || [];
  let text = '';
  for (const ev of events) {
    if (!ev.segs) continue;
    const line = ev.segs.map(s=>s.utf8||'').join('').replace(/\n/g,' ').trim();
    if (line) text += line + ' ';
  }
  text = text.trim();
  if (text.length > 30) return { text, label: track.name?.simpleText || track.languageCode };

  // Fallback to XML
  const xmlUrl = track.baseUrl;
  const xmlHtml = await proxyFetch(xmlUrl, 10000);
  const xmlText = parseXML(xmlHtml);
  if (xmlText.length > 30) return { text: xmlText, label: track.name?.simpleText };

  throw new Error('empty_caption');
}

// ── Method 3: youtubetranscript.com ──────────────────────────
async function tryYTTranscript(videoId, lang) {
  st('youtubetranscript.com 시도 중...');
  // Their API endpoint
  const url = `https://youtubetranscript.com/?server_vid2=${videoId}`;
  const html = await proxyFetch(url, 12000);
  // Parse transcript text from their page
  const xmlMatch = html.match(/<text[^>]*>([\s\S]*?)<\/text>/g);
  if (xmlMatch && xmlMatch.length > 5) {
    const text = xmlMatch
      .map(t => decHtml(t.replace(/<[^>]+>/g,'')))
      .filter(Boolean).join(' ').replace(/\s+/g,' ').trim();
    if (text.length > 30) return { text, label: 'auto' };
  }
  throw new Error('ytranscript_failed');
}

// ── Method 4: kome.ai transcript ─────────────────────────────
async function tryKome(videoId) {
  st('kome.ai 시도 중...');
  const url = `https://kome.ai/api/transcript?videoId=${videoId}`;
  const html = await proxyFetch(url, 12000);
  try {
    const data = JSON.parse(html);
    const text = (data.transcript || data.text || data.data || '')
      .replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim();
    if (text.length > 30) return { text, label: 'auto' };
  } catch {}
  throw new Error('kome_failed');
}

// ── Main ──────────────────────────────────────────────────────
async function run() {
  const urlVal = document.getElementById('urlInput').value.trim();
  const lang   = document.getElementById('langSel').value;
  if (!urlVal) { err('YouTube URL을 입력해주세요.'); return; }
  const videoId = getId(urlVal);
  if (!videoId) { err('유효한 YouTube URL이 아닙니다.'); return; }

  const btn = document.getElementById('goBtn');
  btn.disabled = true;
  document.getElementById('ebox').classList.remove('on');
  document.getElementById('res').classList.remove('on');

  const methods = [
    () => tryTimedtext(videoId, lang),
    () => tryPageParse(videoId, lang),
    () => tryYTTranscript(videoId, lang),
    () => tryKome(videoId),
  ];

  let result = null;
  let lastErr = '';
  for (const method of methods) {
    try {
      result = await method();
      if (result?.text?.length > 30) break;
    } catch (e) {
      lastErr = e.message;
      if (e.message === 'no_captions') {
        err('이 영상에는 자막이 없습니다.');
        btn.disabled = false;
        return;
      }
    }
  }

  if (!result || result.text.length < 30) {
    err(`자막을 가져올 수 없었습니다.\n(${lastErr})\n\n자막이 없는 영상이거나, 잠시 후 다시 시도해보세요.`);
    btn.disabled = false;
    return;
  }

  const { text, label } = result;
  const words = text.split(/\s+/).filter(Boolean).length;
  document.getElementById('wc').textContent = words.toLocaleString();
  document.getElementById('cc').textContent = text.length.toLocaleString();
  document.getElementById('tlabel').textContent = label ? `[${label}]` : '';
  document.getElementById('tbox').textContent = text;
  document.getElementById('res').classList.add('on');
  st(`완료 — ${words.toLocaleString()}단어`, 'ok');
  btn.disabled = false;
}

async function cp() {
  const text = document.getElementById('tbox').textContent;
  if (!text) return;
  try { await navigator.clipboard.writeText(text); } catch {}
  const btn = document.getElementById('cpBtn');
  btn.textContent = '✓ 복사됨'; btn.classList.add('cp');
  setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('cp'); }, 2000);
}

function dl() {
  const text = document.getElementById('tbox').textContent;
  if (!text) return;
  const id = getId(document.getElementById('urlInput').value) || 'transcript';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], { type: 'text/plain;charset=utf-8' }));
  a.download = `transcript_${id}.txt`;
  a.click(); URL.revokeObjectURL(a.href);
}

document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') run();
});
</script>

</body>
</html>
