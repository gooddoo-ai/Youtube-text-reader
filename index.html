<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT Script — YouTube 스크립트 추출기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #060608; --surface: #0e0e12; --border: #1e1e26;
    --accent: #d4f542; --text: #e8e8f0; --muted: #5a5a72; --error: #ff5b5b;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; padding: 40px 20px; }
  .container { max-width: 800px; margin: 0 auto; }

header { margin-bottom: 44px; }
.logo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.logo-badge { background: #d4f542; color: #000; font-family: ‘Space Mono’, monospace; font-size: 11px; font-weight: 700; padding: 4px 9px; letter-spacing: .1em; border-radius: 2px; }
.logo-line { flex: 1; height: 1px; background: #1e1e26; }
h1 { font-size: clamp(34px, 6vw, 58px); font-weight: 800; line-height: 1.05; letter-spacing: -.03em; }
h1 span { color: #d4f542; }
.subtitle { margin-top: 10px; color: #5a5a72; font-size: 13px; font-family: ‘Space Mono’, monospace; }

.section-label { font-size: 11px; font-family: ‘Space Mono’, monospace; color: #5a5a72; margin-bottom: 6px; letter-spacing: .06em; text-transform: uppercase; }
.section-label span { color: #d4f542; }

.api-row { display: flex; gap: 8px; margin-bottom: 6px; }
.api-input { flex: 1; background: #0e0e12; border: 1px solid #1e1e26; border-radius: 6px; color: #e8e8f0; font-family: ‘Space Mono’, monospace; font-size: 12px; padding: 11px 16px; outline: none; transition: border-color .2s; }
.api-input::placeholder { color: #3a3a50; }
.api-input:focus { border-color: #d4f542; }
.save-btn { background: #1e1e26; border: 1px solid #2a2a3a; border-radius: 6px; color: #e8e8f0; font-family: ‘Syne’, sans-serif; font-size: 12px; font-weight: 600; padding: 0 18px; cursor: pointer; transition: all .15s; white-space: nowrap; }
.save-btn:hover { border-color: #d4f542; color: #d4f542; }
.key-ok { font-size: 11px; font-family: ‘Space Mono’, monospace; color: #d4f542; display: none; }
.key-ok.on { display: block; }

.divider { height: 1px; background: #1e1e26; margin: 24px 0; }

.url-wrap { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.url-input { flex: 1; min-width: 200px; background: #0e0e12; border: 1px solid #1e1e26; border-radius: 6px; color: #e8e8f0; font-family: ‘Space Mono’, monospace; font-size: 13px; padding: 14px 18px; outline: none; transition: border-color .2s; }
.url-input::placeholder { color: #5a5a72; }
.url-input:focus { border-color: #d4f542; }
.lang-select { background: #0e0e12; border: 1px solid #1e1e26; border-radius: 6px; color: #e8e8f0; font-family: ‘Syne’, sans-serif; font-size: 13px; padding: 0 14px; outline: none; cursor: pointer; min-width: 86px; }
.lang-select option { background: #0e0e12; }
.extract-btn { background: #d4f542; color: #000; border: none; border-radius: 6px; font-family: ‘Syne’, sans-serif; font-size: 14px; font-weight: 700; padding: 14px 26px; cursor: pointer; letter-spacing: .04em; transition: all .15s; white-space: nowrap; }
.extract-btn:hover { background: #c4e832; transform: translateY(-1px); }
.extract-btn:active { transform: translateY(0); }
.extract-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.hint { color: #5a5a72; font-size: 11px; font-family: ‘Space Mono’, monospace; }
.hint::before { content: ’→ ’; color: #d4f542; }

.status-bar { display: none; align-items: center; gap: 10px; margin: 14px 0; padding: 12px 16px; background: #0e0e12; border: 1px solid #1e1e26; border-radius: 6px; font-family: ‘Space Mono’, monospace; font-size: 12px; color: #5a5a72; }
.status-bar.on { display: flex; }
.spinner { width: 14px; height: 14px; border: 2px solid #1e1e26; border-top-color: #d4f542; border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
.dot-ok  { width: 8px; height: 8px; border-radius: 50%; background: #d4f542; flex-shrink: 0; }
.dot-err { width: 8px; height: 8px; border-radius: 50%; background: #ff5b5b; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }

.error-box { display: none; background: #1a0808; border: 1px solid #3a1010; border-radius: 8px; padding: 18px 22px; font-family: ‘Space Mono’, monospace; font-size: 12px; color: #ff5b5b; line-height: 1.9; margin-bottom: 14px; }
.error-box.on { display: block; }
.error-box strong { display: block; margin-bottom: 6px; font-size: 13px; }

.result-section { display: none; }
.result-section.on { display: block; }
.result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 10px; }
.result-meta { font-size: 12px; font-family: ‘Space Mono’, monospace; color: #5a5a72; }
.result-meta strong { color: #d4f542; }
.action-btns { display: flex; gap: 8px; }
.action-btn { background: #0e0e12; border: 1px solid #1e1e26; border-radius: 4px; color: #e8e8f0; font-family: ‘Syne’, sans-serif; font-size: 12px; font-weight: 600; padding: 7px 14px; cursor: pointer; transition: all .15s; }
.action-btn:hover { border-color: #d4f542; color: #d4f542; }
.copied { color: #d4f542 !important; border-color: #d4f542 !important; }
.transcript-box { background: #0e0e12; border: 1px solid #1e1e26; border-radius: 8px; padding: 22px; font-family: ‘Space Mono’, monospace; font-size: 13px; line-height: 1.9; color: #c8c8dc; white-space: pre-wrap; word-break: break-word; max-height: 520px; overflow-y: auto; resize: vertical; scrollbar-width: thin; scrollbar-color: #1e1e26 transparent; }
.transcript-box::-webkit-scrollbar { width: 5px; }
.transcript-box::-webkit-scrollbar-thumb { background: #1e1e26; border-radius: 3px; }

footer { margin-top: 44px; padding-top: 20px; border-top: 1px solid #1e1e26; display: flex; justify-content: space-between; font-size: 11px; font-family: ‘Space Mono’, monospace; color: #5a5a72; }
footer span { color: #d4f542; }
</style>

</head>
<body>
<div class="container">

  <header>
    <div class="logo-row">
      <div class="logo-badge">YT SCRIPT</div>
      <div class="logo-line"></div>
      <span style="font-family:'Space Mono',monospace;font-size:11px;color:#5a5a72;">v3.1 · OpenAI Powered</span>
    </div>
    <h1>YouTube<br><span>스크립트</span> 추출기</h1>
    <p class="subtitle">// GPT-4o 웹 검색으로 자막을 직접 가져옵니다</p>
  </header>

  <!-- API Key -->

  <div style="margin-bottom:0">
    <div class="section-label">OpenAI API Key <span>*필수</span></div>
    <div class="api-row">
      <input class="api-input" type="password" id="apiKeyInput"
        placeholder="sk-proj-..." autocomplete="off" spellcheck="false"/>
      <button class="save-btn" onclick="saveKey()">저장</button>
    </div>
    <div class="key-ok" id="keyOk">✓ API 키 저장됨 (세션 내 유효)</div>
  </div>

  <div class="divider"></div>

  <!-- URL + Extract -->

  <div style="margin-bottom:24px">
    <div class="section-label">YouTube URL</div>
    <div class="url-wrap">
      <input class="url-input" type="text" id="urlInput"
        placeholder="https://youtu.be/... 또는 youtube.com/watch?v=..."
        autocomplete="off" spellcheck="false"/>
      <select class="lang-select" id="langSelect">
        <option value="ko">한국어</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="zh">中文</option>
      </select>
      <button class="extract-btn" id="extractBtn" onclick="run()">추출하기</button>
    </div>
    <p class="hint">자막(자동 생성 포함) 지원 · 약 20~40초 소요</p>
  </div>

  <div class="status-bar" id="statusBar">
    <div class="spinner" id="statusIcon"></div>
    <span id="statusText"></span>
  </div>

  <div class="error-box" id="errorBox">
    <strong>⚠ 오류</strong>
    <span id="errorMsg"></span>
  </div>

  <div class="result-section" id="resultSection">
    <div class="result-header">
      <div class="result-meta">
        <strong id="wordCount">0</strong>단어 &nbsp;·&nbsp;
        <strong id="charCount">0</strong>자
      </div>
      <div class="action-btns">
        <button class="action-btn" id="copyBtn" onclick="copyText()">복사</button>
        <button class="action-btn" onclick="downloadText()">다운로드</button>
        <button class="action-btn" onclick="resetUI()">초기화</button>
      </div>
    </div>
    <div class="transcript-box" id="transcriptBox"></div>
  </div>

  <footer>
    <span>gpt-4o-search-preview</span>
    <span>gooddoo-ai</span>
  </footer>
</div>

<script>
let apiKey = '';

function saveKey() {
  const k = document.getElementById('apiKeyInput').value.trim();
  if (!k.startsWith('sk-')) { alert('올바른 OpenAI API 키를 입력해주세요. (sk- 로 시작)'); return; }
  apiKey = k;
  document.getElementById('keyOk').classList.add('on');
}

function getId(url) {
  const m = url.trim().match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  if (/^[a-zA-Z0-9_-]{11}$/.test(url.trim())) return url.trim();
  return null;
}

function st(msg, type = 'spin') {
  document.getElementById('statusBar').classList.add('on');
  document.getElementById('statusText').textContent = msg;
  document.getElementById('statusIcon').className =
    type === 'ok' ? 'dot-ok' : type === 'err' ? 'dot-err' : 'spinner';
}

function showErr(msg) {
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('errorBox').classList.add('on');
  st('실패', 'err');
}

function resetUI() {
  ['resultSection','errorBox'].forEach(id => document.getElementById(id).classList.remove('on'));
  document.getElementById('statusBar').classList.remove('on');
  document.getElementById('transcriptBox').textContent = '';
  document.getElementById('urlInput').value = '';
}

async function run() {
  const urlVal = document.getElementById('urlInput').value.trim();
  const lang   = document.getElementById('langSelect').value;
  const key    = apiKey || document.getElementById('apiKeyInput').value.trim();

  if (!key || !key.startsWith('sk-')) { showErr('OpenAI API 키를 먼저 입력하고 저장해주세요.'); return; }
  if (!urlVal) { showErr('YouTube URL을 입력해주세요.'); return; }
  const videoId = getId(urlVal);
  if (!videoId) { showErr('유효한 YouTube URL이 아닙니다.'); return; }

  const btn = document.getElementById('extractBtn');
  btn.disabled = true;
  document.getElementById('errorBox').classList.remove('on');
  document.getElementById('resultSection').classList.remove('on');
  st('GPT-4o에 연결 중...');

  const langMap = { ko: '한국어', en: 'English', ja: '日本語', zh: '中文' };
  const ytUrl = `https://www.youtube.com/watch?v=${videoId}`;

  const systemPrompt = `You are a YouTube transcript extraction specialist.
Your ONLY job is to output the raw transcript text of a YouTube video.
Rules:
- Output ONLY the transcript/subtitle text. Nothing else.
- No introduction, no explanation, no commentary.
- Remove timestamps and speaker labels.
- Keep sentences separated by newlines.
- If transcript cannot be found, output exactly: TRANSCRIPT_NOT_FOUND`;

  const userPrompt = `Extract the full transcript of this YouTube video.
URL: ${ytUrl}
Video ID: ${videoId}
Preferred language: ${langMap[lang] || lang}

Search for the transcript using web search. Try queries like:
- "${videoId} transcript"
- "${videoId} youtube subtitles"
- site:youtubetranscript.com ${videoId}

Output the transcript text only.`;

  try {
    st('GPT-4o가 자막 검색 중... (20~40초 소요)');

    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${key}`,
      },
      body: JSON.stringify({
        model: 'gpt-4o-search-preview',
        web_search_options: {},
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user',   content: userPrompt },
        ],
        max_tokens: 8000,
      }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `API 오류 ${res.status}`);
    }

    const data = await res.json();
    let text = (data.choices?.[0]?.message?.content || '').trim();

    if (!text || text === 'TRANSCRIPT_NOT_FOUND') {
      throw new Error('자막을 찾지 못했습니다.\n이 영상에 자막이 없거나, 검색 결과에서 자막을 가져올 수 없었습니다.');
    }

    // Light cleanup: remove any leading meta lines
    text = text
      .replace(/^(here is|here's|the transcript|transcript of|자막|스크립트)[^\n]*\n/gim, '')
      .replace(/TRANSCRIPT_NOT_FOUND/g, '')
      .trim();

    if (text.length < 30) {
      throw new Error('추출된 텍스트가 너무 짧습니다. 다시 시도해보세요.');
    }

    const words = text.split(/\s+/).filter(Boolean).length;
    document.getElementById('wordCount').textContent = words.toLocaleString();
    document.getElementById('charCount').textContent = text.length.toLocaleString();
    document.getElementById('transcriptBox').textContent = text;
    document.getElementById('resultSection').classList.add('on');
    st(`완료 — ${words.toLocaleString()}단어`, 'ok');

  } catch (e) {
    showErr(e.message || '알 수 없는 오류가 발생했습니다.');
  } finally {
    btn.disabled = false;
  }
}

async function copyText() {
  const text = document.getElementById('transcriptBox').textContent;
  if (!text) return;
  try { await navigator.clipboard.writeText(text); } catch {}
  const btn = document.getElementById('copyBtn');
  btn.textContent = '✓ 복사됨'; btn.classList.add('copied');
  setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 2000);
}

function downloadText() {
  const text = document.getElementById('transcriptBox').textContent;
  if (!text) return;
  const id = getId(document.getElementById('urlInput').value) || 'transcript';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], { type: 'text/plain;charset=utf-8' }));
  a.download = `transcript_${id}.txt`;
  a.click(); URL.revokeObjectURL(a.href);
}

document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') run();
});
document.getElementById('apiKeyInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveKey();
});
</script>

</body>
</html>
