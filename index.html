<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT Script — YouTube 스크립트 추출기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg: #060608;
–surface: #0e0e12;
–border: #1e1e26;
–accent: #d4f542;
–accent2: #5b4dff;
–text: #e8e8f0;
–muted: #5a5a72;
–error: #ff5b5b;
}

body {
background: var(–bg);
color: var(–text);
font-family: ‘Syne’, sans-serif;
min-height: 100vh;
padding: 40px 20px;
}

/* Grain overlay */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘noise’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23noise)’ opacity=‘0.04’/%3E%3C/svg%3E”);
pointer-events: none;
z-index: 0;
opacity: 0.6;
}

.container {
max-width: 780px;
margin: 0 auto;
position: relative;
z-index: 1;
}

/* Header */
header {
margin-bottom: 48px;
}

.logo-row {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 10px;
}

.logo-badge {
background: var(–accent);
color: #000;
font-family: ‘Space Mono’, monospace;
font-size: 11px;
font-weight: 700;
padding: 4px 9px;
letter-spacing: 0.1em;
border-radius: 2px;
}

.logo-line {
flex: 1;
height: 1px;
background: var(–border);
}

h1 {
font-size: clamp(36px, 7vw, 62px);
font-weight: 800;
line-height: 1.05;
letter-spacing: -0.03em;
}

h1 span {
color: var(–accent);
}

.subtitle {
margin-top: 12px;
color: var(–muted);
font-size: 14px;
font-family: ‘Space Mono’, monospace;
letter-spacing: 0.04em;
}

/* Input section */
.input-section {
margin-bottom: 24px;
}

.url-wrap {
display: flex;
gap: 10px;
align-items: stretch;
margin-bottom: 12px;
}

.url-input {
flex: 1;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 6px;
color: var(–text);
font-family: ‘Space Mono’, monospace;
font-size: 13px;
padding: 14px 18px;
outline: none;
transition: border-color 0.2s;
}

.url-input::placeholder { color: var(–muted); }
.url-input:focus { border-color: var(–accent); }

.lang-select {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 6px;
color: var(–text);
font-family: ‘Syne’, sans-serif;
font-size: 13px;
padding: 0 14px;
outline: none;
cursor: pointer;
transition: border-color 0.2s;
min-width: 90px;
}
.lang-select:focus { border-color: var(–accent); }
.lang-select option { background: #0e0e12; }

.extract-btn {
background: var(–accent);
color: #000;
border: none;
border-radius: 6px;
font-family: ‘Syne’, sans-serif;
font-size: 14px;
font-weight: 700;
padding: 14px 28px;
cursor: pointer;
letter-spacing: 0.04em;
transition: all 0.15s;
white-space: nowrap;
position: relative;
overflow: hidden;
}

.extract-btn:hover { background: #c4e832; transform: translateY(-1px); }
.extract-btn:active { transform: translateY(0); }
.extract-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.hint {
color: var(–muted);
font-size: 11px;
font-family: ‘Space Mono’, monospace;
display: flex;
align-items: center;
gap: 8px;
}

.hint::before {
content: ‘→’;
color: var(–accent);
}

/* Status */
.status-bar {
display: none;
align-items: center;
gap: 10px;
margin-bottom: 20px;
padding: 12px 16px;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 6px;
font-family: ‘Space Mono’, monospace;
font-size: 12px;
color: var(–muted);
}

.status-bar.active { display: flex; }

.spinner {
width: 14px;
height: 14px;
border: 2px solid var(–border);
border-top-color: var(–accent);
border-radius: 50%;
animation: spin 0.7s linear infinite;
flex-shrink: 0;
}

@keyframes spin { to { transform: rotate(360deg); } }

.status-dot {
width: 8px;
height: 8px;
border-radius: 50%;
flex-shrink: 0;
}

.status-dot.success { background: var(–accent); }
.status-dot.error { background: var(–error); }

/* Result section */
.result-section {
display: none;
}

.result-section.visible { display: block; }

.result-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 14px;
}

.result-meta {
font-size: 12px;
font-family: ‘Space Mono’, monospace;
color: var(–muted);
}

.result-meta strong {
color: var(–accent);
margin-right: 4px;
}

.action-btns {
display: flex;
gap: 8px;
}

.action-btn {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 4px;
color: var(–text);
font-family: ‘Syne’, sans-serif;
font-size: 12px;
font-weight: 600;
padding: 7px 14px;
cursor: pointer;
transition: all 0.15s;
letter-spacing: 0.03em;
}

.action-btn:hover { border-color: var(–accent); color: var(–accent); }

.transcript-box {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 8px;
padding: 24px;
font-family: ‘Space Mono’, monospace;
font-size: 13px;
line-height: 1.9;
color: #c8c8dc;
white-space: pre-wrap;
word-break: break-word;
max-height: 520px;
overflow-y: auto;
resize: vertical;
scrollbar-width: thin;
scrollbar-color: var(–border) transparent;
}

.transcript-box::-webkit-scrollbar { width: 6px; }
.transcript-box::-webkit-scrollbar-track { background: transparent; }
.transcript-box::-webkit-scrollbar-thumb { background: var(–border); border-radius: 3px; }

/* Error */
.error-box {
display: none;
background: #1a0a0a;
border: 1px solid #3a1a1a;
border-radius: 8px;
padding: 20px 24px;
font-family: ‘Space Mono’, monospace;
font-size: 12px;
color: var(–error);
line-height: 1.8;
}

.error-box.visible { display: block; }
.error-box strong { display: block; margin-bottom: 8px; font-size: 13px; }

/* Footer */
footer {
margin-top: 48px;
padding-top: 24px;
border-top: 1px solid var(–border);
display: flex;
justify-content: space-between;
align-items: center;
font-size: 11px;
font-family: ‘Space Mono’, monospace;
color: var(–muted);
}

.powered {
display: flex;
align-items: center;
gap: 6px;
}

.powered span { color: var(–accent); }

/* Copy feedback */
.copied {
color: var(–accent) !important;
border-color: var(–accent) !important;
}
</style>

</head>
<body>
<div class="container">
  <header>
    <div class="logo-row">
      <div class="logo-badge">YT SCRIPT</div>
      <div class="logo-line"></div>
      <span style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);">v1.0</span>
    </div>
    <h1>YouTube<br><span>스크립트</span> 추출기</h1>
    <p class="subtitle">// URL 붙여넣기 → 텍스트 추출 → 복사</p>
  </header>

  <div class="input-section">
    <div class="url-wrap">
      <input
        class="url-input"
        type="text"
        id="urlInput"
        placeholder="https://www.youtube.com/watch?v=... 또는 youtu.be/..."
        autocomplete="off"
        spellcheck="false"
      />
      <select class="lang-select" id="langSelect">
        <option value="ko">한국어</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="zh">中文</option>
      </select>
      <button class="extract-btn" id="extractBtn" onclick="extractTranscript()">
        추출하기
      </button>
    </div>
    <p class="hint">자막이 있는 영상만 지원됩니다. 자동 생성 자막도 가능.</p>
  </div>

  <!-- Status -->

  <div class="status-bar" id="statusBar">
    <div class="spinner" id="statusSpinner"></div>
    <span id="statusText">영상 정보를 가져오는 중...</span>
  </div>

  <!-- Error -->

  <div class="error-box" id="errorBox">
    <strong>⚠ 추출 실패</strong>
    <span id="errorMsg"></span>
  </div>

  <!-- Result -->

  <div class="result-section" id="resultSection">
    <div class="result-header">
      <div class="result-meta">
        <strong id="wordCount">0</strong>단어 &nbsp;·&nbsp;
        <strong id="charCount">0</strong>자
      </div>
      <div class="action-btns">
        <button class="action-btn" id="copyBtn" onclick="copyText()">복사</button>
        <button class="action-btn" onclick="downloadText()">다운로드</button>
        <button class="action-btn" onclick="clearResult()">초기화</button>
      </div>
    </div>
    <div class="transcript-box" id="transcriptBox"></div>
  </div>

  <footer>
    <span>YouTube Transcript Extractor</span>
    <div class="powered">Invidious API + <span>YouTube Timedtext</span></div>
  </footer>
</div>

<script>
// Invidious public instances (fallback chain)
const INVIDIOUS = [
  'https://inv.nadeko.net',
  'https://invidious.privacydev.net',
  'https://iv.melmac.space',
  'https://invidious.fdn.fr',
];
const PROXY = 'https://corsproxy.io/?';

function extractVideoId(url) {
  url = url.trim();
  const patterns = [
    /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/,
    /^([a-zA-Z0-9_-]{11})$/,
  ];
  for (const p of patterns) {
    const m = url.match(p);
    if (m) return m[1];
  }
  return null;
}

function setStatus(text, icon = 'spinner') {
  const bar = document.getElementById('statusBar');
  bar.classList.add('active');
  document.getElementById('statusText').textContent = text;
  const s = document.getElementById('statusSpinner');
  if (icon === 'spinner') { s.className = 'spinner'; s.style.animation = ''; }
  else if (icon === 'success') { s.className = 'status-dot success'; s.style.animation = 'none'; }
  else { s.className = 'status-dot error'; s.style.animation = 'none'; }
}

function showError(msg) {
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('errorBox').classList.add('visible');
  setStatus('추출 실패', 'error');
}

function clearError() { document.getElementById('errorBox').classList.remove('visible'); }

function clearResult() {
  document.getElementById('resultSection').classList.remove('visible');
  document.getElementById('transcriptBox').textContent = '';
  clearError();
  document.getElementById('statusBar').classList.remove('active');
  document.getElementById('urlInput').value = '';
}

function decodeHtml(str) {
  return str
    .replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>')
    .replace(/&quot;/g, '"').replace(/&#39;/g, "'").replace(/&nbsp;/g, ' ')
    .replace(/&#(\d+);/g, (_, n) => String.fromCharCode(n))
    .replace(/<[^>]+>/g, '');
}

// Method 1: Invidious captions API
async function tryInvidious(videoId, lang) {
  for (let i = 0; i < INVIDIOUS.length; i++) {
    const host = INVIDIOUS[i];
    setStatus(`자막 목록 조회 중... (${i + 1}/${INVIDIOUS.length})`);
    try {
      const res = await fetch(`${host}/api/v1/captions/${videoId}`, { signal: AbortSignal.timeout(6000) });
      if (!res.ok) continue;
      const data = await res.json();
      const caps = data.captions || [];
      if (!caps.length) throw new Error('NO_CAPTIONS');

      // Pick best language track
      let cap = caps.find(c => c.languageCode === lang)
        || caps.find(c => c.languageCode?.startsWith(lang))
        || caps.find(c => c.label?.toLowerCase().includes('auto'))
        || caps[0];

      setStatus(`[${cap.label || cap.languageCode}] 자막 다운로드 중...`);

      // Fetch the actual caption file via proxy (CORS)
      const capUrl = `${host}${cap.url}&fmt=vtt`;
      const cr = await fetch(PROXY + encodeURIComponent(capUrl), { signal: AbortSignal.timeout(10000) });
      if (!cr.ok) continue;
      const vtt = await cr.text();
      return parseVTT(vtt);
    } catch (e) {
      if (e.message === 'NO_CAPTIONS') throw e;
      continue;
    }
  }
  throw new Error('INVIDIOUS_FAILED');
}

// Method 2: Direct YouTube timedtext API via proxy
async function tryTimedtext(videoId, lang) {
  setStatus('YouTube Timedtext API 시도 중...');
  const langs = [lang, lang === 'ko' ? 'en' : 'ko', 'en'];
  for (const l of langs) {
    const url = `https://www.youtube.com/api/timedtext?v=${videoId}&lang=${l}&fmt=json3&xorb=2&xobt=3&xovt=3`;
    try {
      const res = await fetch(PROXY + encodeURIComponent(url), { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const data = await res.json();
      const events = data.events || [];
      if (!events.length) continue;
      let text = '';
      for (const ev of events) {
        if (!ev.segs) continue;
        const line = ev.segs.map(s => s.utf8 || '').join('').replace(/\n/g, ' ').trim();
        if (line) text += line + ' ';
      }
      text = text.trim();
      if (text.length > 20) return text;
    } catch { continue; }
  }
  throw new Error('TIMEDTEXT_FAILED');
}

function parseVTT(vtt) {
  return vtt
    .split('\n')
    .filter(l => !l.startsWith('WEBVTT') && !l.startsWith('NOTE') && !l.match(/^\d+$/) && !l.match(/[\d:\.]+\s*-->\s*[\d:\.]+/))
    .map(l => decodeHtml(l.trim()))
    .filter(l => l.length > 0)
    .join(' ')
    .replace(/\s+/g, ' ')
    .trim();
}

async function extractTranscript() {
  const url = document.getElementById('urlInput').value.trim();
  const lang = document.getElementById('langSelect').value;

  if (!url) { showError('YouTube URL을 입력해주세요.'); return; }

  const videoId = extractVideoId(url);
  if (!videoId) { showError('유효한 YouTube URL이 아닙니다.'); return; }

  const btn = document.getElementById('extractBtn');
  btn.disabled = true;
  clearError();
  document.getElementById('resultSection').classList.remove('visible');

  try {
    let transcript = '';

    // Try Invidious first, then fallback to timedtext
    try {
      transcript = await tryInvidious(videoId, lang);
    } catch (e) {
      if (e.message === 'NO_CAPTIONS') {
        throw new Error('이 영상에는 자막이 없습니다.\n(자동 생성 자막 포함)');
      }
      transcript = await tryTimedtext(videoId, lang);
    }

    if (!transcript || transcript.length < 10) {
      throw new Error('자막을 추출했지만 내용이 비어있습니다.\n다른 언어를 선택해보세요.');
    }

    const words = transcript.split(/\s+/).filter(Boolean).length;
    document.getElementById('wordCount').textContent = words.toLocaleString();
    document.getElementById('charCount').textContent = transcript.length.toLocaleString();
    document.getElementById('transcriptBox').textContent = transcript;
    document.getElementById('resultSection').classList.add('visible');
    setStatus(`추출 완료 — ${words.toLocaleString()}단어`, 'success');

  } catch (err) {
    showError(err.message || '알 수 없는 오류');
  } finally {
    btn.disabled = false;
  }
}

async function copyText() {
  const text = document.getElementById('transcriptBox').textContent;
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ 복사됨';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 2000);
  } catch { alert('클립보드 복사 실패. 텍스트를 직접 선택해 복사해주세요.'); }
}

function downloadText() {
  const text = document.getElementById('transcriptBox').textContent;
  if (!text) return;
  const videoId = extractVideoId(document.getElementById('urlInput').value) || 'transcript';
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `transcript_${videoId}.txt`;
  a.click();
  URL.revokeObjectURL(a.href);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') extractTranscript();
  });
});
</script>

</body>
</html>
